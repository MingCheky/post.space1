  <path d="M169 514l4 8 4-6 10-5" stroke="#4a4a6a" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="176" y="530" font-size="9" fill="#4a4a6a" font-family="-apple-system, sans-serif" text-anchor="middle">Send</text>
