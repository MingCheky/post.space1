<rect x="240" y="42" width="3" height="6" rx="1" fill="#eeeef5"/>
<rect x="245" y="40" width="3" height="8" rx="1" fill="#eeeef5"/>
<rect x="250" y="38" width="3" height="10" rx="1" fill="#eeeef5"/>
<rect x="255" y="36" width="3" height="12" rx="1" fill="#eeeef5"/>
