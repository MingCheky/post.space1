  <circle cx="44" cy="459" r="16" fill="#374151"/>
  <text x="44" y="464" font-size="10" fill="#9ca3af" font-family="-apple-system, sans-serif" font-weight="700" text-anchor="middle">KL</text>
  <text x="68" y="448" font-size="11" fill="#7878a0" font-family="-apple-system, sans-serif">Klaus Brandt</text>
  <text x="68" y="461" font-size="10" fill="#4a4a6a" font-family="-apple-system, sans-serif">Tracking update: In transit</text>
