  <path d="M37 508h22M37 508v9a2 2 0 002 2h18a2 2 0 002-2v-9" stroke="#6366f1" stroke-width="1.3" stroke-linecap="round" fill="none"/>
  <path d="M37 508l11 7 11-7" stroke="#6366f1" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="52" cy="499" r="5" fill="#6366f1"/>
