<svg width="320" height="620" viewBox="0 0 320 620" role="img" xmlns="http://www.w3.org/2000/svg">
<title>ThePost.Space — mobile app</title>
<defs>
  <linearGradient id="phone-body" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#1c1c2e"/>
    <stop offset="100%" stop-color="#0e0e1a"/>
  </linearGradient>
  <linearGradient id="acc-m" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#6366f1"/>
    <stop offset="100%" stop-color="#06b6d4"/>
  </linearGradient>
  <linearGradient id="screen-bg-m" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#05050e"/>
    <stop offset="100%" stop-color="#08081a"/>
  </linearGradient>
  <clipPath id="screen-clip">
    <rect x="16" y="56" width="288" height="508" rx="8"/>
  </clipPath>
  <filter id="glow-m">
    <feGaussianBlur stdDeviation="6" result="blur"/>
    <feComposite in="SourceGraphic" in2="blur" operator="over"/>
  </filter>
</defs>

<!-- Phone body -->
<rect x="2" y="2" width="316" height="616" rx="44" fill="url(#phone-body)" stroke="#2a2a3e" stroke-width="1.5"/>
<!-- Side shine -->
<rect x="2" y="2" width="316" height="616" rx="44" fill="none" stroke="url(#acc-m)" stroke-width="0.5" opacity="0.3"/>

<!-- Side buttons -->
<rect x="-1" y="130" width="4" height="36" rx="2" fill="#252538"/>
<rect x="-1" y="178" width="4" height="56" rx="2" fill="#252538"/>
<rect x="317" y="148" width="4" height="66" rx="2" fill="#252538"/>

<!-- Screen area -->
<rect x="16" y="56" width="288" height="508" rx="8" fill="url(#screen-bg-m)"/>

<!-- Dynamic island -->
<rect x="116" y="18" width="88" height="26" rx="13" fill="#000"/>
<circle cx="185" cy="31" r="4" fill="#111"/>
<circle cx="185" cy="31" r="1.5" fill="#1a1a2a"/>

<!-- Status bar -->
<text x="30" y="45" font-size="12" fill="#eeeef5" font-family="'SF Pro Display', -apple-system, sans-serif" font-weight="600">9:41</text>
<!-- Battery -->
<rect x="264" y="37" width="22" height="11" rx="2.5" stroke="#eeeef5" stroke-width="1.2" fill="none"/>
<rect x="286" y="40" width="2.5" height="5" rx="1" fill="#eeeef5"/>
<rect x="265.5" y="38.5" width="16" height="8" rx="1.5" fill="#eeeef5"/>
