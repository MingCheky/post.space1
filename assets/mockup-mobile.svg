<path d="M226 42 Q229 38 232 42" stroke="#eeeef5" stroke-width="1.2" fill="none" stroke-linecap="round"/>
<path d="M223 39 Q229 33 235 39" stroke="#eeeef5" stroke-width="1.2" fill="none" stroke-linecap="round"/>
<circle cx="229" cy="44" r="1.5" fill="#eeeef5"/>

