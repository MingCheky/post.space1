  <circle cx="44" cy="164" r="16" fill="#6366f1" opacity="0.9"/>
  <text x="44" y="169" font-size="12" fill="#fff" font-family="-apple-system, sans-serif" font-weight="700" text-anchor="middle">A</text>
  <text x="68" y="153" font-size="11" fill="#eeeef5" font-family="-apple-system, sans-serif" font-weight="700">alice@globalship.eu</text>
  <text x="68" y="166" font-size="10" fill="#7878a0" font-family="-apple-system, sans-serif">Parcel TP8821 is on its way!</text>
  <text x="68" y="179" font-size="9" fill="#4a4a6a" font-family="-apple-system, sans-serif">We're happy to confirm your sh…</text>
