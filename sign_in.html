<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign in to your ThePost.Space account.">
    <meta name="theme-color" content="#05050e">
    <title>Sign In · ThePost.Space</title>
    <link rel="icon" href="assets/logo.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
    :root {
      --bg: #05050e; --bg-card: #0d0d20; --bg-hover: #131328;
      --border: #1a1a32; --border-l: #252540;
      --text: #eeeef5; --text-2: #7878a0; --text-3: #4a4a6a;
      --accent: #6366f1; --accent-l: #818cf8;
      --cyan: #06b6d4; --green: #10b981;
      --grad: linear-gradient(135deg,#6366f1 0%,#06b6d4 100%);
      --r: 12px; --font: 'Inter',-apple-system,sans-serif;
      --font-d: 'Unbounded',-apple-system,sans-serif;
      --t: all .25s cubic-bezier(.16,1,.3,1);
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{font-family:var(--font);background:var(--bg);color:var(--text);
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      overflow-x:hidden;line-height:1.6}
    /* Background */
    .bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
    .blob{position:absolute;border-radius:50%;filter:blur(120px);opacity:.07}
    .blob-1{width:500px;height:500px;background:var(--accent);top:-150px;right:-100px;animation:bp1 20s ease-in-out infinite}
    .blob-2{width:380px;height:380px;background:var(--cyan);bottom:-100px;left:-80px;animation:bp2 16s ease-in-out infinite}
    @keyframes bp1{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,20px)}}
    @keyframes bp2{0%,100%{transform:translate(0,0)}50%{transform:translate(-20px,-30px)}}
    .cursor-glow{position:fixed;width:400px;height:400px;border-radius:50%;
      background:radial-gradient(circle,rgba(99,102,241,.06) 0%,transparent 70%);
      pointer-events:none;z-index:1;top:0;left:0;will-change:transform}
    /* Card */
    .card{position:relative;z-index:2;width:100%;max-width:420px;margin:24px;
      padding:40px 36px;background:var(--bg-card);border:1px solid var(--border);
      border-radius:20px;box-shadow:0 24px 80px rgba(0,0,0,.5)}
    /* Header */
    .card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px}
    .logo{display:flex;align-items:center;gap:9px;text-decoration:none;
      font-family:var(--font-d);font-size:1rem;font-weight:700}
    .logo-icon{width:32px;height:32px;border-radius:9px;background:var(--grad);
      display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .logo-icon svg{width:16px;height:16px;color:#fff}
    .logo-text{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .lang-switch{display:flex;align-items:center;background:var(--bg);
      border:1px solid var(--border);border-radius:8px;padding:3px;gap:2px}
    .lang-btn{padding:4px 12px;border:none;background:transparent;color:var(--text-3);
      font-size:11px;font-weight:700;border-radius:5px;cursor:pointer;transition:var(--t);
      font-family:var(--font-d);letter-spacing:.05em}
    .lang-btn.active{background:var(--accent);color:#fff}
    /* Title */
    .card-title{font-family:var(--font-d);font-size:1.45rem;font-weight:700;
      letter-spacing:-.02em;margin-bottom:6px}
    .card-sub{color:var(--text-2);font-size:.9rem;margin-bottom:28px}
    /* Fields */
    .field{margin-bottom:16px;position:relative}
    .field label{display:block;font-size:.82rem;font-weight:500;color:var(--text-2);margin-bottom:6px}
    .field input{width:100%;padding:12px 14px 12px 40px;background:var(--bg);
      border:1px solid var(--border);border-radius:var(--r);color:var(--text);
      font-size:.94rem;font-family:var(--font);transition:var(--t);outline:none}
    .field input::placeholder{color:var(--text-3)}
    .field input:focus{border-color:var(--accent);background:var(--bg-hover);
      box-shadow:0 0 0 3px rgba(99,102,241,.12)}
    .field-icon{position:absolute;left:13px;top:37px;color:var(--text-3);pointer-events:none}
    .field-icon svg{width:15px;height:15px}
    .field--pw input{padding-right:42px}
    .pw-toggle{position:absolute;right:11px;top:33px;background:none;border:none;
      color:var(--text-3);padding:5px;cursor:pointer;transition:color .2s}
    .pw-toggle:hover{color:var(--text)}
    .pw-toggle svg{width:15px;height:15px}
    /* Row */
    .form-row{display:flex;justify-content:space-between;align-items:center;
      margin-bottom:22px;font-size:.85rem;gap:8px;flex-wrap:wrap}
    .check-label{display:inline-flex;align-items:center;gap:8px;cursor:pointer;color:var(--text-2)}
    .check-label input{display:none}
    .check-box{width:16px;height:16px;border:1.5px solid var(--border-l);border-radius:4px;
      background:var(--bg);display:inline-flex;align-items:center;justify-content:center;
      flex-shrink:0;transition:var(--t)}
    .check-label input:checked+.check-box{background:var(--accent);border-color:var(--accent)}
    .check-label input:checked+.check-box::after{content:'';width:8px;height:5px;
      border-left:2px solid #fff;border-bottom:2px solid #fff;
      transform:rotate(-45deg) translate(1px,-1px);display:block}
    .forgot-link{color:var(--accent-l);font-size:.85rem;font-weight:500;
      text-decoration:none;transition:color .2s}
    .forgot-link:hover{color:var(--text)}
    /* Submit */
    .btn-submit{width:100%;margin-bottom:20px;padding:13px 24px;border-radius:var(--r);
      background:var(--grad);color:#fff;border:none;font-size:.95rem;font-weight:600;
      font-family:var(--font);cursor:pointer;position:relative;overflow:hidden;
      box-shadow:0 4px 20px rgba(99,102,241,.32);transition:var(--t);
      display:flex;align-items:center;justify-content:center;gap:8px}
    .btn-submit:hover{transform:translateY(-1px);box-shadow:0 8px 32px rgba(99,102,241,.48)}
    .btn-submit:active{transform:translateY(0)}
    .btn-submit:disabled{opacity:.65;cursor:not-allowed;transform:none}
    .ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.22);
      transform:scale(0);pointer-events:none;animation:rippleA .6s ease-out forwards}
    @keyframes rippleA{to{transform:scale(3);opacity:0}}
    .spinner{width:15px;height:15px;border:2px solid rgba(255,255,255,.3);
      border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
    .btn-submit.loading .spinner{display:inline-block}
    .btn-submit.loading .btn-label{opacity:.7}
    @keyframes spin{to{transform:rotate(360deg)}}
    /* Message */
    .msg{padding:11px 14px;border-radius:var(--r);font-size:.86rem;
      margin-bottom:16px;display:none;border:1px solid}
    .msg.show{display:block}
    .msg.error{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.25);color:#fca5a5}
    .msg.success{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.25);color:#6ee7b7}
    /* Footer */
    .card-foot{text-align:center;color:var(--text-3);font-size:.88rem;margin-top:4px}
    .card-foot a{color:var(--accent-l);font-weight:600;margin-left:4px;text-decoration:none}
    .card-foot a:hover{color:var(--text)}
    .back-link{position:absolute;bottom:-36px;left:0;right:0;text-align:center;
      font-size:.84rem;color:var(--text-3);text-decoration:none;transition:color .2s;
      display:flex;align-items:center;justify-content:center;gap:5px}
    .back-link:hover{color:var(--text-2)}
    @media(max-width:480px){.card{padding:28px 20px;margin:16px}.card-title{font-size:1.25rem}}
    </style>
</head>
<body>

<div class="bg" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
</div>
<div class="cursor-glow" id="cursorGlow" aria-hidden="true"></div>

<div class="card">
    <div class="card-header">
        <a href="index.html" class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </div>
            <span class="logo-text">ThePost.Space</span>
        </a>
        <div class="lang-switch">
            <button class="lang-btn active" id="langEn" data-lang="en">EN</button>
            <button class="lang-btn" id="langRu" data-lang="ru">RU</button>
        </div>
    </div>

    <h1 class="card-title" data-i18n="title">Welcome back</h1>
    <p class="card-sub" data-i18n="sub">Sign in to your ThePost.Space account.</p>

    <div class="msg" id="formMsg"></div>

    <form id="loginForm" novalidate>
        <div class="field">
            <label for="loginEmail" data-i18n="label_email">Email</label>
            <input type="email" id="loginEmail" name="email" required
                   autocomplete="email" data-i18n-ph="ph_email" placeholder="you@example.com">
            <span class="field-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </span>
        </div>
        <div class="field field--pw">
            <label for="loginPw" data-i18n="label_pw">Password</label>
            <input type="password" id="loginPw" name="password" required
                   autocomplete="current-password" data-i18n-ph="ph_pw" placeholder="Enter your password">
            <span class="field-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            </span>
            <button type="button" class="pw-toggle" id="pwToggle" aria-label="Toggle password visibility">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
        </div>
        <div class="form-row">
            <label class="check-label">
                <input type="checkbox" id="rememberMe" checked>
                <span class="check-box"></span>
                <span data-i18n="remember">Remember me</span>
            </label>
            <a href="#" id="forgotLink" class="forgot-link" data-i18n="forgot">Forgot password?</a>
        </div>
        <button type="submit" class="btn-submit" id="loginBtn">
            <span class="btn-label" data-i18n="btn_signin">Sign in</span>
            <span class="spinner"></span>
        </button>
    </form>

    <p class="card-foot">
        <span data-i18n="no_account">Don't have an account?</span>
        <a href="contact.html" data-i18n="apply">Submit an application</a>
    </p>

    <a href="index.html" class="back-link">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        <span data-i18n="back_home">Back to homepage</span>
    </a>
</div>

<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script>
'use strict';
/* ===== Unified i18n system ===== */
const T = {
  en: {
    title:'Welcome back', sub:'Sign in to your ThePost.Space account.',
    label_email:'Email', label_pw:'Password',
    ph_email:'you@example.com', ph_pw:'Enter your password',
    remember:'Remember me', forgot:'Forgot password?', btn_signin:'Sign in',
    no_account:"Don't have an account?", apply:'Submit an application',
    back_home:'Back to homepage',
    err_fill:'Please fill in all fields.',
    err_email:'Enter your email above first.',
    ok_reset:'Reset link sent to', ok_signin:'Signed in! Redirecting\u2026',
    err_invalid_email:'Invalid email address.', err_not_found:'No account found.',
    err_wrong_pw:'Incorrect password.', err_too_many:'Too many attempts. Try again later.',
    err_network:'Network error.', err_default:'Incorrect email or password.',
  },
  ru: {
    title:'\u0421 \u0432\u043e\u0437\u0432\u0440\u0430\u0449\u0435\u043d\u0438\u0435\u043c',
    sub:'\u0412\u043e\u0439\u0434\u0438\u0442\u0435 \u0432 \u0432\u0430\u0448 \u0430\u043a\u043a\u0430\u0443\u043d\u0442 ThePost.Space.',
    label_email:'Email', label_pw:'\u041f\u0430\u0440\u043e\u043b\u044c',
    ph_email:'\u0432\u0430\u0448@example.com', ph_pw:'\u0412\u0432\u0435\u0434\u0438\u0442\u0435 \u043f\u0430\u0440\u043e\u043b\u044c',
    remember:'\u0417\u0430\u043f\u043e\u043c\u043d\u0438\u0442\u044c \u043c\u0435\u043d\u044f',
    forgot:'\u0417\u0430\u0431\u044b\u043b\u0438 \u043f\u0430\u0440\u043e\u043b\u044c?',
    btn_signin:'\u0412\u043e\u0439\u0442\u0438',
    no_account:'\u041d\u0435\u0442 \u0430\u043a\u043a\u0430\u0443\u043d\u0442\u0430?',
    apply:'\u041f\u043e\u0434\u0430\u0442\u044c \u0437\u0430\u044f\u0432\u043a\u0443',
    back_home:'\u041d\u0430 \u0433\u043b\u0430\u0432\u043d\u0443\u044e',
    err_fill:'\u0417\u0430\u043f\u043e\u043b\u043d\u0438\u0442\u0435 \u0432\u0441\u0435 \u043f\u043e\u043b\u044f.',
    err_email:'\u0421\u043d\u0430\u0447\u0430\u043b\u0430 \u0432\u0432\u0435\u0434\u0438\u0442\u0435 email \u0432\u044b\u0448\u0435.',
    ok_reset:'\u0421\u0441\u044b\u043b\u043a\u0430 \u043e\u0442\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u0430 \u043d\u0430',
    ok_signin:'\u0412\u0445\u043e\u0434 \u0432\u044b\u043f\u043e\u043b\u043d\u0435\u043d! \u041f\u0435\u0440\u0435\u043d\u0430\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u0438\u0435\u2026',
    err_invalid_email:'\u0412\u0432\u0435\u0434\u0438\u0442\u0435 \u043a\u043e\u0440\u0440\u0435\u043a\u0442\u043d\u044b\u0439 email.',
    err_not_found:'\u0410\u043a\u043a\u0430\u0443\u043d\u0442 \u043d\u0435 \u043d\u0430\u0439\u0434\u0435\u043d.',
    err_wrong_pw:'\u041d\u0435\u0432\u0435\u0440\u043d\u044b\u0439 \u043f\u0430\u0440\u043e\u043b\u044c.',
    err_too_many:'\u0421\u043b\u0438\u0448\u043a\u043e\u043c \u043c\u043d\u043e\u0433\u043e \u043f\u043e\u043f\u044b\u0442\u043e\u043a.',
    err_network:'\u041e\u0448\u0438\u0431\u043a\u0430 \u0441\u0435\u0442\u0438.',
    err_default:'\u041d\u0435\u0432\u0435\u0440\u043d\u044b\u0439 \u043b\u043e\u0433\u0438\u043d \u0438\u043b\u0438 \u043f\u0430\u0440\u043e\u043b\u044c.',
  }
};

let lang = 'en';
try { const s = localStorage.getItem('lang'); if (s === 'ru') lang = 'ru'; } catch(e) {}

function applyLang(l) {
  lang = l;
  try { localStorage.setItem('lang', l); } catch(e) {}
  document.documentElement.lang = l;
  document.getElementById('langEn').classList.toggle('active', l === 'en');
  document.getElementById('langRu').classList.toggle('active', l === 'ru');
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (T[l][key] !== undefined) el.textContent = T[l][key];
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    const key = el.getAttribute('data-i18n-ph');
    if (T[l][key] !== undefined) el.placeholder = T[l][key];
  });
}

/* ===== Cursor glow — GPU-accelerated ===== */
const cg = document.getElementById('cursorGlow');
if (window.matchMedia('(hover: hover)').matches) {
  document.addEventListener('mousemove', e => {
    cg.style.transform = `translate(calc(${e.clientX}px - 50%), calc(${e.clientY}px - 50%))`;
  }, { passive: true });
}

/* ===== Event delegation — zero inline onclick ===== */
document.addEventListener('click', e => {
  const langBtn = e.target.closest('[data-lang]');
  if (langBtn) { applyLang(langBtn.dataset.lang); return; }
  const submitBtn = e.target.closest('.btn-submit');
  if (submitBtn && !submitBtn.disabled) {
    const r = submitBtn.getBoundingClientRect();
    const rip = document.createElement('span');
    rip.className = 'ripple';
    const sz = Math.max(r.width, r.height);
    rip.style.cssText = `width:${sz}px;height:${sz}px;left:${e.clientX-r.left-sz/2}px;top:${e.clientY-r.top-sz/2}px`;
    submitBtn.appendChild(rip);
    setTimeout(() => rip.remove(), 650);
  }
});

/* ===== Password toggle ===== */
document.getElementById('pwToggle').addEventListener('click', function() {
  const inp = document.getElementById('loginPw');
  const hide = inp.type === 'password';
  inp.type = hide ? 'text' : 'password';
  this.style.color = hide ? 'var(--accent-l)' : 'var(--text-3)';
});

/* ===== Firebase ===== */
firebase.initializeApp({
  apiKey:"AIzaSyD65Tb0PBeX8qyskDV360eTp_Ovkg5UCIU",
  authDomain:"thepostspace.firebaseapp.com",
  projectId:"thepostspace",
  storageBucket:"thepostspace.firebasestorage.app",
  messagingSenderId:"930121073201",
  appId:"1:930121073201:web:984283f9819e65c2674b10"
});
const auth = firebase.auth();

const formMsg = document.getElementById('formMsg');
function showMsg(text, type) {
  formMsg.textContent = text;
  formMsg.className = 'msg show ' + type;
  setTimeout(() => formMsg.classList.remove('show'), 5000);
}
function setLoading(on) {
  const btn = document.getElementById('loginBtn');
  btn.classList.toggle('loading', on);
  btn.disabled = on;
}
const ERR_MAP = {
  'auth/invalid-email':'err_invalid_email','auth/user-not-found':'err_not_found',
  'auth/wrong-password':'err_wrong_pw','auth/too-many-requests':'err_too_many',
  'auth/network-request-failed':'err_network'
};
function getErr(code) { return T[lang][ERR_MAP[code] || 'err_default']; }

document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value.trim();
  const pw    = document.getElementById('loginPw').value;
  const rem   = document.getElementById('rememberMe').checked;
  if (!email || !pw) { showMsg(T[lang].err_fill, 'error'); return; }
  setLoading(true);
  try {
    await auth.setPersistence(rem ? firebase.auth.Auth.Persistence.LOCAL : firebase.auth.Auth.Persistence.SESSION);
    await auth.signInWithEmailAndPassword(email, pw);
    showMsg(T[lang].ok_signin, 'success');
    setTimeout(() => window.location.href = 'index.html', 1200);
  } catch(err) {
    showMsg(getErr(err.code), 'error');
    setLoading(false);
  }
});

document.getElementById('forgotLink').addEventListener('click', async e => {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value.trim();
  if (!email) { showMsg(T[lang].err_email, 'error'); return; }
  try {
    await auth.sendPasswordResetEmail(email);
    showMsg(`${T[lang].ok_reset} ${email}.`, 'success');
  } catch(err) { showMsg(getErr(err.code), 'error'); }
});

applyLang(lang);
</script>
</body>
</html>
