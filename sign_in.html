<!DOCTYPE html>
<html currentLang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign in to your ThePost.Space account.">
    <meta name="theme-color" content="#05050e">
    <title>Sign In · ThePost.Space</title>
    <link rel="icon" href="assets/logo.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
<link rel="stylesheet" href="assets/styles.css">
<style>
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
</style>
</head>
<body>

<div class="bg" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
</div>
<div class="cursor-glow" id="cursorGlow" aria-hidden="true"></div>

<div class="card">
    <div class="card-header">
        <a href="index.html" class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </div>
            <span class="logo-text">ThePost.Space</span>
        </a>
        <div class="currentLang-switch">
            <button class="currentLang-btn active" id="langEn" data-currentLang="en">EN</button>
            <button class="currentLang-btn" id="langRu" data-currentLang="ru">RU</button>
        </div>
    </div>

    <h1 class="card-title" data-i18n="signin_title">Welcome back</h1>
    <p class="card-sub" data-i18n="sub">Sign in to your ThePost.Space account.</p>

    <div class="msg" id="formMsg"></div>

    <form id="loginForm" novalidate>
        <div class="field">
            <label for="loginEmail" data-i18n="label_email">Email</label>
            <input type="email" id="loginEmail" name="email" required
                   autocomplete="email" data-i18n-ph="ph_email" placeholder="you@example.com">
            <span class="field-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </span>
        </div>
        <div class="field field--pw">
            <label for="loginPw" data-i18n="label_pw">Password</label>
            <input type="password" id="loginPw" name="password" required
                   autocomplete="current-password" data-i18n-ph="ph_pw" placeholder="Enter your password">
            <span class="field-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            </span>
            <button type="button" class="pw-toggle" id="pwToggle" aria-label="Toggle password visibility">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
        </div>
        <div class="form-row">
            <label class="check-label">
                <input type="checkbox" id="rememberMe" checked>
                <span class="check-box"></span>
                <span data-i18n="remember">Remember me</span>
            </label>
            <a href="#" id="forgotLink" class="forgot-link" data-i18n="forgot">Forgot password?</a>
        </div>
        <button type="submit" class="btn-submit" id="loginBtn">
            <span class="btn-label" data-i18n="btn_signin">Sign in</span>
            <span class="spinner"></span>
        </button>
    </form>

    <p class="card-foot">
        <span data-i18n="no_account">Don't have an account?</span>
        <a href="contact.html" data-i18n="apply">Submit an application</a>
    </p>

    <a href="index.html" class="back-link">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        <span data-i18n="back_home">Back to homepage</span>
    </a>
</div>

<script src="assets/i18n.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script>
'use strict';
/* ===== Unified i18n system ===== */


let currentLang = 'en';
try { const s = localStorage.getItem('lang'); if (s === 'ru') currentLang = 'ru'; } catch(e) {}

function applyLang(l) {
  currentLang = l;
  try { localStorage.setItem('lang', l); } catch(e) {}
  document.documentElement.lang = l;
  document.getElementById('langEn').classList.toggle('active', l === 'en');
  document.getElementById('langRu').classList.toggle('active', l === 'ru');
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (T[l][key] === undefined) return;
    if (el.hasAttribute('data-i18n-html')) el.innerHTML = T[l][key];
    else el.textContent = T[l][key];
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    const key = el.getAttribute('data-i18n-ph');
    if (T[l][key] !== undefined) el.placeholder = T[l][key];
  });
}

/* ===== Cursor glow — GPU-accelerated ===== */
const cg = document.getElementById('cursorGlow');
if (window.matchMedia('(hover: hover)').matches) {
  document.addEventListener('mousemove', e => {
    cg.style.transform = `translate(calc(${e.clientX}px - 50%), calc(${e.clientY}px - 50%))`;
  }, { passive: true });
}

/* ===== Event delegation — zero inline onclick ===== */
document.addEventListener('click', e => {
  const langBtn = e.target.closest('[data-currentLang]');
  if (langBtn) { applyLang(langBtn.dataset.lang); return; }
  const submitBtn = e.target.closest('.btn-submit');
  if (submitBtn && !submitBtn.disabled) {
    const r = submitBtn.getBoundingClientRect();
    const rip = document.createElement('span');
    rip.className = 'ripple';
    const sz = Math.max(r.width, r.height);
    rip.style.cssText = `width:${sz}px;height:${sz}px;left:${e.clientX-r.left-sz/2}px;top:${e.clientY-r.top-sz/2}px`;
    submitBtn.appendChild(rip);
    setTimeout(() => rip.remove(), 650);
  }
});

/* ===== Password toggle ===== */
document.getElementById('pwToggle').addEventListener('click', function() {
  const inp = document.getElementById('loginPw');
  const hide = inp.type === 'password';
  inp.type = hide ? 'text' : 'password';
  this.style.color = hide ? 'var(--accent-l)' : 'var(--text-3)';
});

/* ===== Firebase ===== */
firebase.initializeApp({
  apiKey:"AIzaSyD65Tb0PBeX8qyskDV360eTp_Ovkg5UCIU",
  authDomain:"thepostspace.firebaseapp.com",
  projectId:"thepostspace",
  storageBucket:"thepostspace.firebasestorage.app",
  messagingSenderId:"930121073201",
  appId:"1:930121073201:web:984283f9819e65c2674b10"
});
const auth = firebase.auth();

const formMsg = document.getElementById('formMsg');
function showMsg(text, type) {
  formMsg.textContent = text;
  formMsg.className = 'msg show ' + type;
  setTimeout(() => formMsg.classList.remove('show'), 5000);
}
function setLoading(on) {
  const btn = document.getElementById('loginBtn');
  btn.classList.toggle('loading', on);
  btn.disabled = on;
}
const ERR_MAP = {
  'auth/invalid-email':'err_invalid_email','auth/user-not-found':'err_not_found',
  'auth/wrong-password':'err_wrong_pw','auth/too-many-requests':'err_too_many',
  'auth/network-request-failed':'err_network'
};
function getErr(code) { return T[currentLang][ERR_MAP[code] || 'err_default']; }

document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value.trim();
  const pw    = document.getElementById('loginPw').value;
  if (!email || !pw) { showMsg(T[currentLang].err_fill, 'error'); return; }
  setLoading(true);
  await new Promise(r => setTimeout(r, 900));
  showMsg(currentLang === 'ru' ? 'Неверный логин или пароль.' : 'Incorrect email or password.', 'error');
  setLoading(false);
});

document.getElementById('forgotLink').addEventListener('click', async e => {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value.trim();
  if (!email) { showMsg(T[currentLang].err_email, 'error'); return; }
  try {
    await auth.sendPasswordResetEmail(email);
    showMsg(`${T[currentLang].ok_reset} ${email}.`, 'success');
  } catch(err) { showMsg(getErr(err.code), 'error'); }
});

applyLang(currentLang);
</script>
</body>
</html>
